<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Potten & Pannen Shop</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f8;
}

/* NAVBAR */
nav {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #222, #444);
  color: white;
  padding: 20px;
  text-align: center;
}

/* LAYOUT */
.container {
  display: flex;
  padding: 20px;
}

/* PRODUCTEN */
.products {
  flex: 2;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.product:hover {
  transform: scale(1.03);
}

.product img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
}

/* CART */
.cart {
  flex: 1;
  background: white;
  margin-left: 20px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* BUTTONS */
button {
  background: #28a745;
  color: white;
  border: none;
  padding: 8px 10px;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 5px;
}

button:hover {
  background: #218838;
}

.remove {
  background: red;
}

/* INPUT */
input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

/* VERZENDING */
.shipping {
  background: #e9f7ef;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 14px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .products {
    grid-template-columns: 1fr;
  }

  .cart {
    margin-left: 0;
    margin-top: 20px;
  }
}
</style>
</head>

<body>

<nav>
  <div><strong>🍳 P&P Shop</strong></div>
  <div>
    <a href="#">Home</a>
    <a href="#">Over ons</a>
    <a href="#">Contact</a>
  </div>
</nav>

<header>
  <h1>Potten & Pannen Shop</h1>
  <p>Gratis verzending vanaf €50 🚚</p>
</header>

<div class="container">

<div class="products">

  <div class="product">
    <img src="https://via.placeholder.com/200?text=Koekenpan">
    <h3>Koekenpan</h3>
    <p>€25</p>
    <button onclick="addToCart('Koekenpan',25)">Toevoegen</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200?text=Kookpot">
    <h3>Kookpot</h3>
    <p>€40</p>
    <button onclick="addToCart('Kookpot',40)">Toevoegen</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200?text=Steelpan">
    <h3>Steelpan</h3>
    <p>€20</p>
    <button onclick="addToCart('Steelpan',20)">Toevoegen</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200?text=Wokpan">
    <h3>Wokpan</h3>
    <p>€35</p>
    <button onclick="addToCart('Wokpan',35)">Toevoegen</button>
  </div>

</div>

<div class="cart">
  <h2>🛒 Winkelmandje</h2>

  <div class="shipping">
    🚚 Gratis verzending vanaf €50 <br>
    📦 Levering binnen 2 werkdagen
  </div>

  <ul id="cartItems"></ul>
  <h3>Totaal: €<span id="total">0</span></h3>

  <h3>Gegevens</h3>
  <input id="name" placeholder="Naam">
  <input id="email" placeholder="E-mail">
  <input id="address" placeholder="Adres">

  <button onclick="checkout()">Afrekenen</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price) {
  let item = cart.find(p => p.name === name);

  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }

  alert("Toegevoegd aan winkelmand 🛒");
  saveCart();
  updateCart();
}

function removeFromCart(name){
  cart = cart.filter(p => p.name !== name);
  saveCart();
  updateCart();
}

function updateCart(){
  const list = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");

  list.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;

    const li = document.createElement("li");
    li.innerHTML = `
      ${item.name} x${item.qty} - €${item.price * item.qty}
      <button class="remove" onclick="removeFromCart('${item.name}')">X</button>
    `;
    list.appendChild(li);
  });

  totalEl.textContent = total;
}

function checkout(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const address = document.getElementById("address").value;

  if(!name || !email || !address){
    alert("Vul alle velden in!");
    return;
  }

  if(!email.includes("@")){
    alert("Voer een geldig e-mailadres in!");
    return;
  }

  alert(`Bedankt ${name}! 🎉\nJe bestelling wordt verzonden naar:\n${address}`);

  cart = [];
  saveCart();
  updateCart();
}

updateCart();
</script>

</body>
</html>
